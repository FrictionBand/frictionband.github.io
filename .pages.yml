media:
  input: src/assets/images
  output: /assets/images

content:

  - name: gigs
    label: Gigs
    type: collection
    path: 'src/gigs'
    icon: guitar
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
      - name: time
        type: string
        label: Time
        description: Time of the gig, e.g. 18-20
      - name: location
        type: string
        label: Location
      - name: gmaps
        label: Google Maps link
        type: string
        required: false
        description: Optional, must be a valid link
      - name: fblink
        label: Facebook event link
        type: string
        required: false
        description: Optional, must be a valid link
      - name: weblink
        label: Website event link
        type: string
        required: false
        description: Optional, must be a valid link
      - name: body
        label: Description
        type: rich-text
        description: Write a sentence or so with a description and any additional info.
    view:
      fields: [ title, date, location ]
      primary: title
      sort: [ date, title ]
      default:
        search: ''
        sort: date
        order: asc

  - name: fi-pages
    label: Finnish Pages
    type: collection
    path: 'src/fi'
    fields:
      - name: title
        label: Title
        type: string
      - name: permalink
        label: Permalink
        type: string
        description: The URL path for this page, e.g. "/fi/bio/" (the trailing slash is important).
      - name: order
        type: number
        label: Navigation order
        description: Links in the navigation are shown in this order. Each page should have a unique positive number.
      - name: layout
        type: string
        hidden: true
        default: "page"
      - name: heroImage
        label: Hero Image
        type: image
        required: false
        description: Optional banner image shown at the top of the page.
      - name: heroVideo
        label: Hero Video
        type: string
        required: false
        description: Optional video path for the hero section (e.g. /assets/videos/slogan.mp4). Used on the home page.
      - name: heroShowLogo
        label: Show Logo in Hero
        type: boolean
        required: false
        description: Show the band logo overlaid on the hero video/image. Used on the home page.
      - name: slogan
        label: Slogan
        type: string
        required: false
        description: Short slogan shown in the hero section. Used on the home page.
      - name: hidden
        label: Hidden from navi
        type: boolean
        description: Hide this page from navigation (it will still be accessible by its URL).
      - name: body
        label: Body
        type: rich-text
        description: |
          Available shortcodes:
          • YouTube embed: paste the video URL on its own line with nothing else around it.
          • {% gallery "/assets/images/foo.jpg", "/assets/images/bar.jpg" %} — masonry image gallery with lightbox.
          • {% gigs 4, false, "Tulevat konsertit", "", true, "/fi/konsertit/" %} — list of upcoming gigs (limit, showDescription, heading, type ("jam" or ""), linkCards, moreUrl).
          • {% contact "Ota yhteyttä" %} — contact button that opens the email form.
          • {% link_button "/fi/bio/", "Lue lisää" %} — styled link button.
          • {% cta "/fi/bio/", "Lue lisää", "Ota yhteyttä" %} — link button + contact button side by side.
          • {% right %}content{% endright %} — right-align a block of content.
    view:
      fields: [ title, order, hidden ]
      primary: title
      sort: [ order, title ]
      default:
        search: ''
        sort: order
        order: asc

  - name: en-pages
    label: English Pages
    type: collection
    path: 'src/en'
    fields:
      - name: title
        label: Title
        type: string
      - name: permalink
        label: Permalink
        type: string
        description: The URL path for this page, e.g. "/bio/" (the trailing slash is important).
      - name: order
        type: number
        label: Navigation order
        description: Links in the navigation are shown in this order. Each page should have a unique positive number.
      - name: layout
        type: string
        hidden: true
        default: "page"
      - name: heroImage
        label: Hero Image
        type: image
        required: false
        description: Optional banner image shown at the top of the page.
      - name: heroVideo
        label: Hero Video
        type: string
        required: false
        description: Optional video path for the hero section (e.g. /assets/videos/slogan.mp4). Used on the home page.
      - name: heroShowLogo
        label: Show Logo in Hero
        type: boolean
        required: false
        description: Show the band logo overlaid on the hero video/image. Used on the home page.
      - name: slogan
        label: Slogan
        type: string
        required: false
        description: Short slogan shown in the hero section. Used on the home page.
      - name: hidden
        label: Hidden from navi
        type: boolean
        description: Hide this page from navigation (it will still be accessible by its URL).
      - name: body
        label: Body
        type: rich-text
        description: |
          Available shortcodes:
          • YouTube embed: paste the video URL on its own line with nothing else around it.
          • {% gallery "/assets/images/foo.jpg", "/assets/images/bar.jpg" %} — masonry image gallery with lightbox.
          • {% gigs 4, false, "Upcoming Concerts", "", true, "/concerts/" %} — list of upcoming gigs (limit, showDescription, heading, type ("jam" or ""), linkCards, moreUrl).
          • {% contact "Get in touch" %} — contact button that opens the email form.
          • {% link_button "/about/", "Read more" %} — styled link button.
          • {% cta "/about/", "Read more", "Get in touch" %} — link button + contact button side by side.
          • {% right %}content{% endright %} — right-align a block of content.
    view:
      fields: [ title, order, hidden ]
      primary: title
      sort: [ order, title ]
      default:
        search: ''
        sort: order
        order: asc

  - name: site
    label: Site Configuration
    path: src/_data/site.json
    type: file
    icon: cog
    fields:
      - name: title
        label: Website title
        type: string
        description: The title of the site, shown on search engine results and in the browser tab title
      - name: description
        label: Website description
        type: string
        description: Description of the site, used mainly for search engines
      - name: keywords
        label: Website keywords
        type: string
        description: Comma-separated list of keywords for search engines
      - name: slogan
        label: Slogan
        type: string
        description: The slogan shown on the home page. Be careful changing this as the layout depends on its length.
      - name: url
        type: string
        hidden: true
        description: The root URL of the website
      - name: baseUrl
        type: string
        hidden: true
        description: The path prefix, e.g. /friction-website/ if hosted under a subdirectory
